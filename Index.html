<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Калькулятор проекта</title>

<style>
body { font-family: Arial, sans-serif; background: #f2f2f2; padding: 20px; }
.card { background: #e9e9e9; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
h2,h3,h4 { margin-bottom: 10px; }
.input, select { padding: 8px 12px; border-radius: 12px; border: none; background: #d6d6d6; }
.row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }
.service { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.unit { font-size: 12px; color: #666; }

.btn {
  background: #ff4d4d;
  border: none;
  padding: 8px 20px;
  border-radius: 12px;
  color: white;
  cursor: pointer;
  margin-top: 10px;
  margin-right: 10px;
}

.designer {
  background: white;
  border-radius: 20px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 20px;
}

.header {
  display: flex;
  align-items: flex-start;
  gap: 15px;
}

.designer-photo {
  width: 120px;
  aspect-ratio: 3/4;
  border-radius: 12px;
  overflow: hidden;
  flex-shrink: 0;
}

.designer-photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.header-info {
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  gap: 2px;
}

.city {
  display: inline-block;
  background: purple;
  color: white;
  padding: 4px 10px;
  border-radius: 10px;
  font-size: 12px;
  max-width: 100%;
  white-space: nowrap;
}

.tags {
  display: flex;
  flex-direction: column;
  gap: 2px;
  margin-top: 0;
}

.tags span {
  display: inline-block;
  background: #00c27a;
  padding: 5px 10px;
  border-radius: 10px;
  font-size: 12px;
  max-width: 100%;
  white-space: nowrap;
}

.calc-row {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.service-line {
  display: flex;
  align-items: center;
  gap: 10px;
}

.rate {
  font-size: 12px;
  min-width: 80px;
  text-align: left;
}

.amount-box {
  background: #d6d6d6;
  padding: 6px 10px;
  border-radius: 8px;
  flex-grow: 1;
  display: flex;
  justify-content: space-between;
  font-size: 12px;
}

.total {
  margin-top: 10px;
  font-weight: bold;
}

.designer .contact-btn {
  margin-top: 10px;
  background: #00aaff;
  padding: 10px 16px;
  border-radius: 12px;
  color: white;
  border: none;
  cursor: pointer;
  align-self: flex-start;
}
</style>
</head>

<body>

<div class="card">

  <h2>
    Калькулятор проекта

    <button class="btn" onclick="generateShareLink()">
      Поделиться
    </button>
  </h2>

  <div class="row">

    <label>Город:</label>

    <select id="city">
      <option>Уфа</option>
      <option>Москва</option>
    </select>

    <label>Телефон:</label>

    <input
      class="input"
      id="phone"
      placeholder="+79001234567"
    />

  </div>

  <div class="row">

    <label>Расположение:</label>

    <select id="placement">
      <option value="1">В черте города</option>
      <option value="1.2">За городом</option>
    </select>

    <label>Тип:</label>

    <select id="type">
      <option>Дом</option>
      <option>Квартира</option>
    </select>

  </div>

  <h3>Наполнение:</h3>

  <div class="service">
    <input type="checkbox" id="measure" checked>
    <label>Выезд для обмерного плана</label>
    <input class="input" type="number" value="62" id="area1">
    <span class="unit">кв.м</span>
  </div>

  <div class="service">
    <input type="checkbox" id="docs" checked>
    <label>Техническая документация</label>
    <input class="input" type="number" value="62" id="area2">
    <span class="unit">кв.м</span>
  </div>

  <div class="service">
    <input type="checkbox" id="visual" checked>
    <label>3D-визуализация</label>
    <input class="input" type="number" value="62" id="area3">
    <span class="unit">кв.м</span>
  </div>

  <div class="service">
    <input type="checkbox" id="table">
    <label>Таблица комплектации</label>
    <input class="input" type="number" value="50" id="areaTable">
    <span class="unit">кв.м</span>
  </div>

  <div class="service">
    <input type="checkbox" id="collage">
    <label>2D-коллажи</label>
    <input class="input" type="number" value="3" id="collageCount">
    <span class="unit">ракурсов</span>
  </div>

</div>

<div class="card">

  <div class="row">

    <label>Бюджет от:</label>
    <input class="input" id="budgetMin" value="10000">

    <label>до:</label>
    <input class="input" id="budgetMax" value="90000">

  </div>

  <div class="row">

    <label>Сортировать:</label>

    <select id="sort">
      <option value="desc">Сначала дороже</option>
      <option value="asc" selected>Сначала дешевле</option>
    </select>

  </div>

  <button class="btn" onclick="calculate()">
    Подобрать дизайнера
  </button>

  <div style="height:20px;"></div>

  <div id="results"></div>

</div>

<script>

// поля для URL
const fields = [
  "city",
  "phone",
  "placement",
  "type",
  "area1",
  "area2",
  "area3",
  "areaTable",
  "collageCount",
  "budgetMin",
  "budgetMax",
  "sort",
  "measure",
  "docs",
  "visual",
  "table",
  "collage"
];

// загрузка параметров
window.onload = function () {

  const params = new URLSearchParams(window.location.search);

  fields.forEach(id => {

    const el = document.getElementById(id);

    if (!el) return;

    const value = params.get(id);

    if (value !== null) {

      if (el.type === "checkbox") {
        el.checked = value === "true";
      }

      else {
        el.value = value;
      }

    }

  });

  calculate();

};

// генерация ссылки
function generateShareLink() {

  const params = new URLSearchParams();

  fields.forEach(id => {

    const el = document.getElementById(id);

    if (!el) return;

    if (el.type === "checkbox") {
      params.set(id, el.checked);
    }

    else {
      params.set(id, el.value);
    }

  });

  const url =
    window.location.origin +
    window.location.pathname +
    "?" +
    params.toString();

  navigator.clipboard.writeText(url);

  alert("Ссылка скопирована!");

}

// расчет
function calculate() {

  const placement = parseFloat(document.getElementById("placement").value);

  const placementText =
    document.getElementById("placement").options[
      document.getElementById("placement").selectedIndex
    ].text;

  const selectedCity = document.getElementById("city").value;

  const phone = document.getElementById("phone").value;

  const type = document.getElementById("type").value;

  const budgetMin =
    parseFloat(document.getElementById("budgetMin").value) || 0;

  const budgetMax =
    parseFloat(document.getElementById("budgetMax").value) || Infinity;

  const sortOrder =
    document.getElementById("sort").value;

  function generateDesignerCard(name, id, customRates=false) {

    let total = 0;

    let servicesText = "";

    let html = `
    <div class="designer">

      <div class="header">

        <div class="designer-photo">
          <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=400">
        </div>

        <div class="header-info">

          <h3>${name} ${id} <span class="city">УФА</span></h3>

          <div class="tags">
            <span>Может выехать на объект</span>
            <span>Составляет ТЗ онлайн</span>
            <span>Дом</span>
            <span>Квартира</span>
          </div>

        </div>

      </div>

      <h4>Расчет стоимости:</h4>
    `;

    function row(
      serviceName,
      val,
      rate,
      amount,
      formulaText
    ) {

      servicesText += formulaText + "\n";

      html += `
      <div class="calc-row">

        <div class="service-line">
          <span>${serviceName}</span>
          <span class="rate">${rate}</span>
        </div>

        <div class="amount-box">
          <span>${amount}</span>
          <span>${Math.round(val)} ₽</span>
        </div>

      </div>`;
    }

    const rateMeasure = customRates ? 90 : 110;
    const rateDocs = customRates ? 90 : 490;
    const rateVisual = customRates ? 90 : 700;
    const rateTable = customRates ? 90 : 160;
    const rateCollage = customRates ? 90 : 1500;

    if (measure.checked) {

      let val = area1.value * rateMeasure * placement;

      total += val;

      row(
        "Обмер",
        val,
        rateMeasure + " ₽/м²",
        area1.value + " кв.м",
        `Обмер=(${rateMeasure}₽/м²)*${area1.value}кв.м=${Math.round(val)}₽`
      );

    }

    if (docs.checked) {

      let val = area2.value * rateDocs * placement;

      total += val;

      row(
        "Документация",
        val,
        rateDocs + " ₽/м²",
        area2.value + " кв.м",
        `Документация=(${rateDocs}₽/м²)*${area2.value}кв.м=${Math.round(val)}₽`
      );

    }

    if (visual.checked) {

      let val = area3.value * rateVisual * placement;

      total += val;

      row(
        "3D-визуализация",
        val,
        rateVisual + " ₽/м²",
        area3.value + " кв.м",
        `3D-визуализация=(${rateVisual}₽/м²)*${area3.value}кв.м=${Math.round(val)}₽`
      );

    }

    if (table.checked) {

      let val = areaTable.value * rateTable;

      total += val;

      row(
        "Таблица комплектации",
        val,
        rateTable + " ₽/м²",
        areaTable.value + " кв.м",
        `Таблица комплектации=(${rateTable}₽/м²)*${areaTable.value}кв.м=${Math.round(val)}₽`
      );

    }

    if (collage.checked) {

      let val = collageCount.value * rateCollage;

      total += val;

      row(
        "2D-коллажи",
        val,
        rateCollage + " ₽/ракурс",
        collageCount.value + " ракурс(ов)",
        `2D-коллажи=(${rateCollage}₽/ракурс)*${collageCount.value}=${Math.round(val)}₽`
      );

    }

    const telegramMessage =
`Город: ${selectedCity}

Телефон: ${phone}

Расположение: ${placementText}

Тип: ${type}

Дизайнер: ${name} ${id}

Расчет стоимости:
${servicesText}

Итого: ${Math.round(total)}₽`;

    const telegramUrl =
      "https://t.me/ikushko?text=" +
      encodeURIComponent(telegramMessage);

    html += `
      <div class="total">
        Итого: ${Math.round(total)} ₽
      </div>
    `;

    html += `
      <a href="${telegramUrl}" target="_blank">
        <button class="contact-btn">
          Связаться
        </button>
      </a>
    `;

    html += `</div>`;

    return {
      html,
      total
    };

  }

  // дизайнеры
  const designers = [

    generateDesignerCard(
      "Полина",
      "0001758"
    ),

    generateDesignerCard(
      "Екатерина",
      "0001759",
      true
    )

  ];

  // фильтрация
  let filteredDesigners = designers.filter(

    d =>
      d.total >= budgetMin &&
      d.total <= budgetMax &&
      selectedCity === "Уфа"

  );

  // сортировка
  if (sortOrder === "asc") {

    filteredDesigners.sort(
      (a,b) => a.total - b.total
    );

  }

  else if (sortOrder === "desc") {

    filteredDesigners.sort(
      (a,b) => b.total - a.total
    );

  }

  // вывод
  document.getElementById("results").innerHTML =

    filteredDesigners.length > 0

      ? filteredDesigners
          .map(d => d.html)
          .join("")

      : "<p>Нет дизайнеров по выбранным параметрам</p>";

}

</script>

</body>
</html>
