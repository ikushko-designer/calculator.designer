<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Калькулятор проекта</title>

<style>

body{
  font-family:Arial,sans-serif;
  background:#f2f2f2;
  padding:20px;
  margin:0;
}

.card{
  background:#e9e9e9;
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
}

h2,h3,h4{
  margin-bottom:10px;
}

.input,
select{
  padding:8px 12px;
  border-radius:12px;
  border:none;
  background:#d6d6d6;
}

.row{
  display:flex;
  gap:10px;
  margin-bottom:10px;
  flex-wrap:wrap;
  align-items:center;
}

.service{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:8px;
  flex-wrap:wrap;
}

.unit{
  font-size:12px;
  color:#666;
}

.btn{
  background:#ff4d4d;
  border:none;
  padding:8px 20px;
  border-radius:12px;
  color:white;
  cursor:pointer;
  margin-top:10px;
  margin-right:10px;
}

.designer{
  background:white;
  border-radius:20px;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-bottom:20px;
}

.header{
  display:flex;
  gap:18px;
  flex-wrap:wrap;
}

.designer-photo{
  width:120px;
  aspect-ratio:3/4;
  border-radius:14px;
  overflow:hidden;
  flex-shrink:0;
}

.designer-photo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.header-info{
  display:flex;
  flex-direction:column;
  gap:8px;
  flex:1;
}

.title-line{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.title-line h3{
  margin:0;
}

.city{
  background:#6d35ff;
  color:white;
  padding:5px 12px;
  border-radius:12px;
  font-size:12px;
  font-weight:bold;
}

.tags-row{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.tag{
  padding:6px 12px;
  border-radius:12px;
  font-size:12px;
  color:white;
  white-space:nowrap;
}

.tag-green{
  background:#00b578;
}

.tag-blue{
  background:#132e7c;
}

.tag-orange{
  background:#ff7b22;
}

.calc-row{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.service-line{
  display:flex;
  justify-content:flex-start;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.rate{
  font-size:13px;
  font-weight:bold;
}

.amount-box{
  background:#d6d6d6;
  padding:8px 12px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:13px;
}

.amount-box-disabled{
  background:#ff3b3b;
  color:white;
}

.total{
  margin-top:10px;
  font-weight:bold;
  font-size:22px;
}

.supervision-badge{
  margin-top:10px;
  display:inline-block;
  background:#00aaff;
  color:white;
  padding:8px 14px;
  border-radius:10px;
  font-size:14px;
  font-weight:normal;
}

.contact-btn{
  margin-top:10px;
  background:#00aaff;
  padding:12px 18px;
  border-radius:12px;
  color:white;
  border:none;
  cursor:pointer;
  font-size:14px;
}

.small-input{
  width:60px;
}

@media (max-width:768px){

  .header{
    flex-direction:column;
  }

  .designer-photo{
    width:100%;
    max-width:220px;
  }

}

</style>

<h2>

Калькулятор проекта

<button class="btn" onclick="generateShareLink()">

<div class="row">

<label>Город:</label>

<select id="city">
<option>Все города</option>

<input

id="phone"
placeholder="+79001234567"

</div>

<div class="row">

</div>

<div class="service">

</div>

<div class="service">
<input type="checkbox" id="table">

<span class="unit">кв.м</span>
</div>

<div class="service">

<input type="checkbox" id="collage">

<input
class="input small-input"
type="number"
value="3"
id="collageCount"
>

<input
class="input small-input"
type="number"
value="62"
id="collageArea"

<span class="unit">кв.м</span>

</div>

<div class="service">
<input type="checkbox" id="supervision">
<label>Авторский надзор</label>
</div>

</div>

<div class="card">

<div class="row">

<label>Бюджет от:</label>
<input class="input" id="budgetMin" value="10000">

<label>до:</label>
<input class="input" id="budgetMax" value="900000">

</div>

<div class="row">

<label>Сортировать:</label>

<select id="sort">
<option value="desc">Сначала дороже</option>
<option value="asc" selected>Сначала дешевле</option>
</select>

</div>

<button class="btn" onclick="calculate()">
Подобрать дизайнера
</button>

<div style="height:20px;"></div>

<div id="results"></div>

</div>

window.onload = function(){

const params = new URLSearchParams(window.location.search);

fields.forEach(id=>{

const el = document.getElementById(id);

if(!el) return;

const value = params.get(id);

if(value !== null){

if(el.type === "checkbox"){
el.checked = value === "true";
}else{
el.value = value;
}

}

});

calculate();

};

function generateShareLink(){

const params = new URLSearchParams();

fields.forEach(id=>{

const el = document.getElementById(id);

if(!el) return;

if(el.type === "checkbox"){
params.set(id, el.checked);
}else{
params.set(id, el.value);
}

});

const url =
window.location.origin +
window.location.pathname +
"?" +
params.toString();

navigator.clipboard.writeText(url);

alert("Ссылка скопирована!");

}

function calculate(){

const placement =
parseFloat(document.getElementById("placement").value);

const placementText =
document.getElementById("placement").options[
document.getElementById("placement").selectedIndex
].text;

const selectedCity =
document.getElementById("city").value;

const phone =
document.getElementById("phone").value;

const type =
document.getElementById("type").value;

const budgetMin =
parseFloat(document.getElementById("budgetMin").value) || 0;

const budgetMax =
parseFloat(document.getElementById("budgetMax").value) || Infinity;

const sortOrder =
document.getElementById("sort").value;

const results = [];

designersData.forEach(designer=>{

if(
selectedCity !== "Все города" &&
!designer.city.includes(selectedCity)
){
return;
}

if(
type !== "Не важно" &&
!designer.objects.includes(type)
){
return;
}

let total = 0;
let hasUnavailableService = false;

function getServiceBox(serviceName, rate, quantityText, value){

const isUnavailable = rate === 0;

if(!isUnavailable){
total += value;
}else{
hasUnavailableService = true;
}

return `
<div class="calc-row">

<div class="service-line">
<span>${serviceName}</span>
<span class="rate">
${isUnavailable ? "Не оказывается" : rate}
${!isUnavailable ? " ₽/м²" : ""}
</span>
</div>

<div class="amount-box ${isUnavailable ? "amount-box-disabled" : ""}">
<span>${quantityText}</span>
<span>
${isUnavailable ? "не оказывается" : Math.round(value) + " ₽"}
</span>
</div>

</div>
`;
}

let servicesHtml = "";

if(measure.checked){

servicesHtml += getServiceBox(
"Обмер",
designer.rates.measure,
`${area1.value} кв.м`,
area1.value * designer.rates.measure * placement
);

}

if(docs.checked){

servicesHtml += getServiceBox(
"Документация",
designer.rates.docs,
`${area2.value} кв.м`,
area2.value * designer.rates.docs * placement
);

}

if(visual.checked){

servicesHtml += getServiceBox(
"3D-визуализация",
designer.rates.visual,
`${area3.value} кв.м`,
area3.value * designer.rates.visual * placement
);

}

if(table.checked){

servicesHtml += getServiceBox(
"Таблица комплектации",
designer.rates.table,
`${areaTable.value} кв.м`,
areaTable.value * designer.rates.table
);

}

if(collage.checked){

const collageValue =
designer.rates.collageType === "m2"
? collageArea.value * designer.rates.collage
: collageCount.value * designer.rates.collage;

const collageQuantity =
designer.rates.collageType === "m2"

: `${collageCount.value} ракурсов`;

const collageRate =
designer.rates.collageType === "m2"
? designer.rates.collage + " ₽/м²"
: designer.rates.collage + " ₽/ракурс";

const isUnavailable = designer.rates.collage === 0;

if(!isUnavailable){
total += collageValue;
}else{
hasUnavailableService = true;
}

servicesHtml += `
<div class="calc-row">

<div class="service-line">
<span>2D-коллажи</span>
<span class="rate">
${isUnavailable ? "Не оказывается" : collageRate}
</span>
</div>

<div class="amount-box ${isUnavailable ? "amount-box-disabled" : ""}">
<span>${collageQuantity}</span>
<span>
${isUnavailable ? "не оказывается" : Math.round(collageValue) + " ₽"}
</span>
</div>

</div>
`;

}

let supervisionValue = 0;

if(supervision.checked){

const isUnavailable = designer.rates.supervision === 0;

if(!isUnavailable){
supervisionValue = designer.rates.supervision;
}else{
hasUnavailableService = true;
}

servicesHtml += `
<div class="calc-row">

<div class="service-line">
<span>Авторский надзор</span>
<span class="rate">
${isUnavailable ? "Не оказывается" : designer.rates.supervision + " ₽/мес."}
</span>
</div>

<span>1 месяц</span>

results.sort((a,b)=>{

if(a.hasUnavailableService !== b.hasUnavailableService){
return a.hasUnavailableService ? 1 : -1;
}

return sortOrder === "asc"
? a.total - b.total
: b.total - a.total;

});
